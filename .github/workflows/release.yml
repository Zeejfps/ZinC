name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*.*.*'

env:
  TAG: ${{ github.ref_name }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-x64
            os: macos-latest
          - rid: osx-arm64
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Install native dependencies (Linux)
        if: matrix.rid == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Publish
        run: dotnet publish ZinC.Cli/ZinC.Cli.csproj -c Release -r ${{ matrix.rid }} -p:Version=${{ env.VERSION }}

      - name: Package (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: Compress-Archive -Path ZinC.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/* -DestinationPath zinc-${{ env.TAG }}-${{ matrix.rid }}.zip

      - name: Package (Linux/macOS)
        if: matrix.rid != 'win-x64'
        run: tar czf zinc-${{ env.TAG }}-${{ matrix.rid }}.tar.gz -C ZinC.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish .

      - uses: actions/upload-artifact@v4
        with:
          name: zinc-${{ matrix.rid }}
          path: zinc-${{ env.TAG }}-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          files: zinc-*
